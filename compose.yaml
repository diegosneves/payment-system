services:
  database:
    image: "mysql:8.2.0-oraclelinux8"
    container_name: payment_mysql_db
    environment:
      - MYSQL_DATABASE=${DB_DATABASE}
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - db-mysql-payment:/var/lib/mysql

volumes:
  db-mysql-payment:
