name: 🔹 Sub-task Request
description: Registre uma sub-tarefa vinculada a uma tarefa principal
title: "[SUBTASK] - "
labels: ["subtask"]
body:
  - type: markdown
    attributes:
      value: |
        ## 🔹 Nova Sub-tarefa
        Preencha as informações abaixo. Lembre-se de vincular à tarefa pai.

  - type: textarea
    id: description
    attributes:
      label: Descrição da sub-tarefa
      description: O que especificamente deve ser feito nesta sub-tarefa?
      placeholder: Ex. Criar o repositório JPA para a entidade Payment.
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Notas técnicas
      description: Detalhes técnicos relevantes para a implementação desta tarefa.
      placeholder: Ex. A entidade Payment deve ter os campos `id`, `transactionId`, `amount`, `status` e `createdAt`.
    validations:
      required: false

  - type: textarea
    id: mockups
    attributes:
      label: Mockups / Referências visuais
      description: Cole imagens, links de Figma ou qualquer referência visual relevante.
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Prioridade
      options:
        - 🔴 Alta
        - 🟡 Média
        - 🟢 Baixa
    validations:
      required: false