
name: CI Prod

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
  pull_request_target:
    types:
      - closed
    branches:
      - main

jobs:
  check-application:
    if: github.event_name != 'pull_request_target'
    strategy:
      matrix:
        ubuntu: ['ubuntu-latest']
    runs-on: ${{ matrix.ubuntu }}

    env:
      API_VERSION: prd
      DB_DATABASE: ${{ secrets.DB_DATABASE }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_USERNAME: ${{ secrets.DB_USERNAME }}
      DB_HOST: 127.0.0.1
      DB_PORT: 3306

    services:
      mysql:
        image: "mysql:8.2.0-oraclelinux8"
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.DB_DATABASE }}
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=10

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4.0.0

      - name: check PR head branch
        run: |
          if [[ "${{ github.head_ref }}" != release/* ]]; then
            echo "PRs to main must come from a release/* branch. PR is from '${{ github.head_ref }}'"
            exit 1
          fi

      - name: Cache SDKMAN
        uses: actions/cache@v4
        with:
          path: ~/.sdkman
          key: ${{ runner.os }}-sdkman-${{ hashFiles('.sdkmanrc') }}
          restore-keys: |
            ${{ runner.os }}-sdkman-

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Get branch name
        shell: bash
        run: echo "BRANCH_NAME=$(echo ${GITHUB_HEAD_REF#release/} | cut -d'/' -f2)" >> $GITHUB_ENV

      - name: Update API Version
        run: echo "API_VERSION=${{ env.BRANCH_NAME }}" >> $GITHUB_ENV

      - name: Instalar SDKMAN
        run: |
          if [ ! -d "$HOME/.sdkman" ]; then
            curl -s "https://get.sdkman.io" | bash
          fi
          source "$HOME/.sdkman/bin/sdkman-init.sh"
        shell: bash

      - name: Configurar Ambiente com SDKMAN
        run: |
          source "$HOME/.sdkman/bin/sdkman-init.sh"
          sdk env install
          sdk current java
          sdk current maven
        shell: bash

      - name: Install Dependencies
        run: |
          source "$HOME/.sdkman/bin/sdkman-init.sh"
          mvn clean install -DskipTests
        shell: bash

      - name: Run Tests
        run: |
          source "$HOME/.sdkman/bin/sdkman-init.sh"
          mvn test
        shell: bash

  build-push-uat-image:
    needs: check-application
    runs-on: ubuntu-latest

    env:
      API_VERSION: uat
      DB_DATABASE: ${{ secrets.DB_DATABASE }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_USERNAME: ${{ secrets.DB_USERNAME }}
      DB_HOST: 127.0.0.1
      DB_PORT: 3306

    services:
      mysql:
        image: "mysql:8.2.0-oraclelinux8"
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.DB_DATABASE }}
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=10

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Cache SDKMAN
        uses: actions/cache@v4
        with:
          path: ~/.sdkman
          key: ${{ runner.os }}-sdkman-${{ hashFiles('.sdkmanrc') }}
          restore-keys: |
            ${{ runner.os }}-sdkman-

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Instalar SDKMAN
        run: |
          if [ ! -d "$HOME/.sdkman" ]; then
            curl -s "https://get.sdkman.io" | bash
          fi
          source "$HOME/.sdkman/bin/sdkman-init.sh"
        shell: bash

      - name: Configurar Ambiente com SDKMAN
        run: |
          source "$HOME/.sdkman/bin/sdkman-init.sh"
          sdk env install
          sdk current java
          sdk current maven
        shell: bash

      - name: Build com Maven
        run: |
          source "$HOME/.sdkman/bin/sdkman-init.sh"
          mvn clean package -DskipTests
        shell: bash

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: diegoneves/payment-system:uat
          context: .
          file: ./Dockerfile
          build-args: |
            DB_DATABASE=${{ secrets.DB_DATABASE }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}

  build-push-image:
    # Executar apenas quando a PR for fechada e mesclada
    if: github.event_name == 'pull_request_target' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    env:
      API_VERSION: prd
      DB_DATABASE: ${{ secrets.DB_DATABASE }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_USERNAME: ${{ secrets.DB_USERNAME }}
      DB_HOST: 127.0.0.1
      DB_PORT: 3306

    services:
      mysql:
        image: "mysql:8.2.0-oraclelinux8"
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.DB_DATABASE }}
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=10

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Cache SDKMAN
        uses: actions/cache@v4
        with:
          path: ~/.sdkman
          key: ${{ runner.os }}-sdkman-${{ hashFiles('.sdkmanrc') }}
          restore-keys: |
            ${{ runner.os }}-sdkman-

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Instalar SDKMAN
        run: |
          if [ ! -d "$HOME/.sdkman" ]; then
            curl -s "https://get.sdkman.io" | bash
          fi
          source "$HOME/.sdkman/bin/sdkman-init.sh"
        shell: bash

      - name: Configurar Ambiente com SDKMAN
        run: |
          source "$HOME/.sdkman/bin/sdkman-init.sh"
          sdk env install
          sdk current java
          sdk current maven
        shell: bash

      - name: Get branch name
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request_target" ]]; then
            REF="${{ github.event.pull_request.head.ref }}"
            echo "BRANCH_NAME=$(echo ${REF#release/} | cut -d'/' -f2)" >> $GITHUB_ENV
          else
            echo "BRANCH_NAME=$(echo ${GITHUB_HEAD_REF#release/} | cut -d'/' -f2)" >> $GITHUB_ENV
          fi

      - name: Update API Version
        run: echo "API_VERSION=${{ env.BRANCH_NAME }}" >> $GITHUB_ENV

      - name: Build com Maven
        run: |
          source "$HOME/.sdkman/bin/sdkman-init.sh"
          mvn clean package -DskipTests
        shell: bash

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: |
            diegoneves/payment-system:latest
            diegoneves/payment-system:${{ env.API_VERSION }}
          context: .
          file: ./Dockerfile
          build-args: |
            DB_DATABASE: ${{ secrets.DB_DATABASE }}
            DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
            DB_USERNAME: ${{ secrets.DB_USERNAME }}
    
